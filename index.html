                                    <label className="block text-[10px] sm:text-xs text-red-200 mb-1.5">من سجل الهدف؟</label>
                                    <select value={goalScorer} onChange={(e) => setGoalScorer(e.target.value)} className="w-full bg-black/50 border border-white/10 rounded-lg p-2 focus:outline-none text-white mb-2.5 text-xs sm:text-sm">
                                        <option value="none">غير محدد</option>
                                        {getTeamPlayers(data.currentMatch.awayTeam).map((p, i) => <option key={i} value={p}>{p}</option>)}
                                    </select>
                                    
                                    <label className="block text-[10px] sm:text-xs text-emerald-200 mb-1.5">من صنع الهدف؟</label>
                                    <select value={goalAssister} onChange={(e) => setGoalAssister(e.target.value)} className="w-full bg-black/50 border border-white/10 rounded-lg p-2 focus:outline-none text-white mb-3 border-emerald-500/30 text-xs sm:text-sm">
                                        <option value="none">بدون صانع</option>
                                        {getTeamPlayers(data.currentMatch.awayTeam).map((p, i) => <option key={i} value={p}>{p}</option>)}
                                    </select>

                                    <div className="flex gap-2 text-xs sm:text-sm">
                                        <button onClick={() => confirmGoal('away')} className="flex-1 bg-red-600 hover:bg-red-500 py-2 rounded-lg text-white font-bold transition-colors">تأكيد الهدف</button>
                                        <button onClick={() => {setActiveGoalTeam(null); setGoalScorer('none'); setGoalAssister('none');}} className="px-3 sm:px-4 bg-gray-700 hover:bg-gray-600 py-2 rounded-lg text-white transition-colors">إلغاء</button>
                                    </div>
                                </div>
                            )}
                          </div>

                          <button onClick={finishMatch} className="w-full py-3 sm:py-4 mt-2 bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-500 hover:to-emerald-500 rounded-xl sm:rounded-2xl font-bold text-white transition-all shadow-md flex justify-center items-center gap-2 border border-green-500/30 text-sm sm:text-base">
                            <i className="fa-solid fa-trophy"></i> إنهاء المباراة واعتماد النتيجة
                          </button>

                          <div className="bg-slate-800/50 p-4 sm:p-5 rounded-xl sm:rounded-2xl border border-white/5 mt-4 sm:mt-6">
                            <h4 className="font-bold mb-3 sm:mb-4 border-b border-white/5 pb-2 flex items-center gap-2 text-purple-400 text-sm sm:text-base">
                              <i className="fa-solid fa-clock-rotate-left"></i> إدارة النتائج السابقة
                            </h4>
                            <div className="space-y-2">
                               {data.recentMatches.map((rm, idx) => (
                                   <div key={idx} className="flex justify-between items-center bg-black/40 p-2 rounded-lg border border-white/10">
                                      <span className="text-xs sm:text-sm text-gray-300 font-semibold truncate flex-1">{rm.homeTeam} <span className="text-blue-400 mx-1">{rm.homeScore} - {rm.awayScore}</span> {rm.awayTeam}</span>
                                      <button onClick={() => removeRecentMatch(idx)} className="text-gray-500 hover:text-red-500 p-1.5 rounded transition-colors shrink-0" title="حذف النتيجة">
                                        <i className="fa-solid fa-trash"></i>
                                      </button>
                                   </div>
                               ))}
                               {data.recentMatches.length === 0 && <span className="text-xs sm:text-sm text-gray-500">لا يوجد نتائج لعرضها</span>}
                            </div>
                          </div>
                        </div>
                      )}

                      {activeSettingsTab === 'schedule' && (
                        <div className="space-y-4 sm:space-y-6">
                          <div className="bg-slate-800/50 p-4 sm:p-5 rounded-xl sm:rounded-2xl border border-indigo-500/30">
                              <h4 className="font-bold mb-3 sm:mb-4 border-b border-white/5 pb-2 flex items-center gap-2 text-indigo-400 text-sm sm:text-base">
                                <i className="fa-solid fa-calendar-days"></i> إنشاء جدول الدوري تلقائياً
                              </h4>
                              <p className="text-[10px] sm:text-xs text-gray-400 mb-3 sm:mb-4">حدد عدد مرات المواجهة بين كل فريقين، وسيقوم النظام بإنشاء جدول.</p>
                              <div className="flex flex-col gap-3 sm:gap-4 mb-4 sm:mb-6">
                                  <div className="w-full">
                                      <label className="block text-[10px] sm:text-xs text-gray-400 mb-1.5 sm:mb-2">عدد المواجهات (ذهاب، إياب...)</label>
                                      <input type="number" min="1" max="4" value={data.rounds} onChange={(e) => setData(prev => ({...prev, rounds: parseInt(e.target.value) || 1}))} className="w-full bg-black/50 border border-white/10 rounded-lg sm:rounded-xl p-2.5 sm:p-3 focus:outline-none focus:border-indigo-500 text-white text-sm sm:text-base" />
                                  </div>
                                  <button onClick={handleGenerateSchedule} className="w-full py-2.5 sm:py-3 bg-indigo-600 hover:bg-indigo-500 rounded-lg sm:rounded-xl font-bold text-white transition-colors flex items-center justify-center gap-2 border border-indigo-500/50 text-sm sm:text-base">
                                      <i className="fa-solid fa-wand-magic-sparkles"></i> إنشاء الجدول
                                  </button>
                              </div>

                              {data.schedule && data.schedule.length > 0 && (
                                  <div className="bg-black/30 p-3 sm:p-4 rounded-lg sm:rounded-xl border border-white/5 max-h-[300px] sm:max-h-[400px] overflow-y-auto custom-scrollbar">
                                      <h5 className="text-xs sm:text-sm font-semibold text-gray-400 mb-2 sm:mb-3 flex items-center justify-between border-b border-white/5 pb-2">
                                        <span>المباريات المجدولة ({data.schedule.length})</span>
                                        <span className="text-[9px] sm:text-xs text-indigo-400 bg-indigo-500/20 px-1.5 sm:px-2 py-0.5 sm:py-1 rounded">القادمة: {data.currentScheduleIndex + 1}</span>
                                      </h5>
                                      <div className="space-y-1.5 sm:space-y-2">
                                          {data.schedule.map((match, idx) => (
                                              <div key={idx} className={`flex items-center justify-between p-2 sm:p-3 rounded-lg border transition-all ${idx < data.currentScheduleIndex ? 'bg-white/5 border-white/5 opacity-50' : idx === data.currentScheduleIndex ? 'bg-indigo-900/50 border-indigo-500/50 shadow-sm' : 'bg-black/40 border-white/5'}`}>
                                                  <span className="text-[9px] sm:text-xs text-gray-400 w-12 sm:w-16 shrink-0">{match.roundName}</span>
                                                  <div className="flex-1 flex items-center justify-center overflow-hidden">
                                                    <span className="text-xs sm:text-sm font-bold flex-1 text-left px-1 sm:px-2 truncate text-white">{match.homeTeam}</span>
                                                    <span className="text-[8px] sm:text-[10px] text-gray-500 font-black px-1 sm:px-2 shrink-0">VS</span>
                                                    <span className="text-xs sm:text-sm font-bold flex-1 text-right px-1 sm:px-2 truncate text-white">{match.awayTeam}</span>
                                                  </div>
                                              </div>
                                          ))}
                                      </div>
                                  </div>
                              )}
                          </div>
                        </div>
                      )}

                      {activeSettingsTab === 'teams' && (
                        <div className="space-y-2 sm:space-y-3">
                          {data.standings.map((team, index) => (
                            <div key={index} className="flex gap-1.5 sm:gap-2 items-center bg-black/30 p-2 sm:p-3 rounded-lg sm:rounded-xl border border-white/5">
                              <button onClick={() => removeTeam(index)} className="p-1.5 sm:p-2 text-gray-500 hover:text-red-500 hover:bg-red-500/10 rounded-md sm:rounded-lg transition-colors shrink-0" title="حذف الفريق">
                                <i className="fa-solid fa-trash text-sm"></i>
                              </button>
                              <div className="w-12 sm:w-20 shrink-0">
                                <input type="number" value={team.points} onChange={(e) => handleStandingsUpdate(index, 'points', e.target.value)} className="w-full bg-black/50 border border-white/10 rounded-md sm:rounded-lg p-1.5 sm:p-2 text-center text-yellow-400 font-bold focus:outline-none text-sm sm:text-base" title="النقاط" />
                              </div>
                              <select value={team.logo} onChange={(e) => handleStandingsUpdate(index, 'logo', e.target.value)} className="bg-black/50 border border-white/10 rounded-md sm:rounded-lg p-1 sm:p-2 text-base sm:text-xl focus:outline-none cursor-pointer h-8 sm:h-10 text-white shrink-0">
                                {LOGO_OPTIONS.map((logo, i) => <option key={i} value={logo} className="bg-slate-800">{logo || 'بدون'}</option>)}
                              </select>
                              <div className="flex-1 min-w-0">
                                <input type="text" value={team.team} onChange={(e) => handleStandingsUpdate(index, 'team', e.target.value)} className="w-full bg-black/50 border border-white/10 rounded-md sm:rounded-lg p-1.5 sm:p-2 focus:outline-none focus:border-blue-500 h-8 sm:h-10 text-white text-xs sm:text-sm" placeholder="اسم الفريق" />
                              </div>
                            </div>
                          ))}
                          <button onClick={addTeam} className="w-full mt-3 sm:mt-4 py-2 sm:py-3 bg-white/5 border border-white/10 border-dashed rounded-lg sm:rounded-xl flex items-center justify-center gap-2 text-gray-400 hover:text-blue-400 hover:border-blue-500/50 transition-all hover:bg-blue-500/10 text-sm">
                            <i className="fa-solid fa-plus"></i> إضافة فريق جديد
                          </button>
                        </div>
                      )}

                      {activeSettingsTab === 'squads' && (
                        <div className="space-y-4 sm:space-y-6">
                          <div className="bg-slate-800/50 p-4 sm:p-5 rounded-xl sm:rounded-2xl border border-purple-500/30">
                            <h4 className="font-bold mb-3 sm:mb-4 border-b border-white/5 pb-2 flex items-center gap-2 text-purple-400 text-sm sm:text-base">
                              <i className="fa-solid fa-clipboard-list"></i> توزيع اللاعبين على الفرق
                            </h4>
                            <div className="mb-3 sm:mb-4">
                              <label className="block text-[10px] sm:text-xs text-gray-400 mb-1.5 sm:mb-2">اختر الفريق</label>
                              <select value={selectedSquadTeam} onChange={(e) => setSelectedSquadTeam(e.target.value)} className="w-full bg-black/50 border border-white/10 rounded-lg sm:rounded-xl p-2.5 sm:p-3 focus:outline-none focus:border-purple-500 cursor-pointer font-semibold text-white text-sm sm:text-base">
                                {data.standings.map((team, i) => <option key={i} value={team.team} className="bg-slate-800 text-white">{team.logo} {team.team}</option>)}
                              </select>
                            </div>
                            <form onSubmit={handleAddPlayerToSquad} className="flex gap-2 mb-4 sm:mb-6">
                              <input type="text" value={newPlayerName} onChange={(e) => setNewPlayerName(e.target.value)} placeholder="اسم اللاعب..." className="flex-1 bg-black/50 border border-white/10 rounded-lg sm:rounded-xl p-2.5 sm:p-3 focus:outline-none focus:border-purple-500 text-white text-sm sm:text-base min-w-0" />
                              <button type="submit" disabled={!newPlayerName.trim()} className="px-4 sm:px-6 bg-purple-600 hover:bg-purple-500 disabled:bg-purple-600/50 rounded-lg sm:rounded-xl font-bold text-white transition-colors flex items-center gap-2 border border-purple-500/50 shrink-0 text-sm sm:text-base">
                                <i className="fa-solid fa-plus"></i> <span className="hidden sm:inline">إضافة</span>
                              </button>
                            </form>
                            <div className="bg-black/30 p-3 sm:p-4 rounded-lg sm:rounded-xl border border-white/5 min-h-[150px] sm:min-h-[200px]">
                              <h5 className="text-xs sm:text-sm font-semibold text-gray-400 mb-2 sm:mb-3 border-b border-white/5 pb-2">قائمة لاعبي الفريق ({data.standings.find(t => t.team === selectedSquadTeam)?.players?.length || 0})</h5>
                              <div className="grid grid-cols-1 sm:grid-cols-2 gap-1.5 sm:gap-2">
                                {data.standings.find(t => t.team === selectedSquadTeam)?.players?.map((player, idx) => (
                                  <div key={idx} className="flex items-center justify-between bg-white/5 hover:bg-white/10 p-2 sm:p-3 rounded-lg border border-white/5 transition-colors group">
                                    <span className="font-semibold flex items-center gap-1.5 sm:gap-2 text-xs sm:text-sm text-gray-300 truncate">
                                      <span className="w-5 h-5 sm:w-6 sm:h-6 rounded-full bg-purple-500/20 text-purple-400 flex items-center justify-center text-[10px] sm:text-xs shrink-0">{idx + 1}</span>
                                      <span className="truncate">{player}</span>
                                    </span>
                                    <button onClick={() => handleRemovePlayerFromSquad(selectedSquadTeam, idx)} className="p-1 sm:p-1.5 text-gray-500 hover:text-red-500 hover:bg-red-500/10 rounded transition-colors shrink-0">
                                      <i className="fa-solid fa-trash text-xs sm:text-sm"></i>
                                    </button>
                                  </div>
                                ))}
                                {(!data.standings.find(t => t.team === selectedSquadTeam)?.players || data.standings.find(t => t.team === selectedSquadTeam)?.players?.length === 0) && (
                                  <div className="col-span-full flex flex-col items-center justify-center py-6 sm:py-8 text-gray-600">
                                    <i className="fa-solid fa-users text-2xl sm:text-4xl mb-1 sm:mb-2 opacity-30"></i>
                                    <p className="text-xs sm:text-sm">لا يوجد لاعبين مضافين.</p>
                                  </div>
                                )}
                              </div>
                            </div>
                          </div>
                        </div>
                      )}

                      {activeSettingsTab === 'stats' && (
                        <div className="space-y-4 sm:space-y-6">
                          <div className="bg-slate-800/50 p-4 sm:p-5 rounded-xl sm:rounded-2xl border border-white/5">
                            <h4 className="font-bold mb-3 sm:mb-4 border-b border-white/5 pb-2 flex items-center gap-2 text-red-400 text-sm sm:text-base">
                              <i className="fa-solid fa-bullseye"></i> إدارة قائمة الهدافين
                            </h4>
                            <div className="space-y-2 sm:space-y-3">
                              {data.topScorers.map((player, index) => (
                                <div key={index} className="flex gap-1.5 sm:gap-2 items-center bg-black/40 p-2 rounded-lg sm:rounded-xl border border-white/5 shadow-sm flex-wrap sm:flex-nowrap">
                                  <button onClick={() => removeStatPlayer('topScorers', index)} className="p-1.5 sm:p-2 text-gray-500 hover:text-red-500 hover:bg-red-500/10 rounded-md sm:rounded-lg transition-colors shrink-0" title="حذف">
                                    <i className="fa-solid fa-trash text-sm"></i>
                                  </button>
                                  <input type="number" value={player.goals} onChange={(e) => handleStatUpdate('topScorers', index, 'goals', e.target.value)} className="w-12 sm:w-16 bg-black/50 border border-white/10 rounded-md sm:rounded-lg p-1.5 sm:p-2 text-center text-red-400 font-bold focus:outline-none text-sm shrink-0" title="الأهداف" />
                                  <input type="text" value={player.name} onChange={(e) => handleStatUpdate('topScorers', index, 'name', e.target.value)} className="flex-1 w-[40%] bg-black/50 border border-white/10 rounded-md sm:rounded-lg p-1.5 sm:p-2 focus:outline-none text-xs sm:text-sm text-white min-w-0" placeholder="اسم اللاعب" />
                                  <select value={player.team} onChange={(e) => handleStatUpdate('topScorers', index, 'team', e.target.value)} className="flex-1 w-[40%] bg-black/50 border border-white/10 rounded-md sm:rounded-lg p-1.5 sm:p-2 text-gray-300 focus:outline-none text-xs sm:text-sm cursor-pointer min-w-0">
                                    <option value="" disabled>اختر الفريق</option>
                                    {data.standings.map((t, i) => <option key={i} value={t.team} className="bg-slate-800">{t.team}</option>)}
                                  </select>
                                </div>
                              ))}
                              <button onClick={() => addStatPlayer('topScorers')} className="w-full mt-2 py-2 sm:py-3 bg-white/5 border border-white/10 border-dashed rounded-lg sm:rounded-xl flex items-center justify-center gap-2 text-xs sm:text-sm text-gray-400 hover:text-blue-400 hover:bg-blue-500/10 transition-all">
                                <i className="fa-solid fa-plus"></i> إضافة لاعب جديد
                              </button>
                            </div>
                          </div>

                          <div className="bg-slate-800/50 p-4 sm:p-5 rounded-xl sm:rounded-2xl border border-white/5">
                            <h4 className="font-bold mb-3 sm:mb-4 border-b border-white/5 pb-2 flex items-center gap-2 text-emerald-400 text-sm sm:text-base">
                              <i className="fa-solid fa-users"></i> إدارة الأكثر صناعة
                            </h4>
                            <div className="space-y-2 sm:space-y-3">
                              {data.topAssists.map((player, index) => (
                                <div key={index} className="flex gap-1.5 sm:gap-2 items-center bg-black/40 p-2 rounded-lg sm:rounded-xl border border-white/5 shadow-sm flex-wrap sm:flex-nowrap">
                                  <button onClick={() => removeStatPlayer('topAssists', index)} className="p-1.5 sm:p-2 text-gray-500 hover:text-red-500 hover:bg-red-500/10 rounded-md sm:rounded-lg transition-colors shrink-0" title="حذف">
                                    <i className="fa-solid fa-trash text-sm"></i>
                                  </button>
                                  <input type="number" value={player.assists} onChange={(e) => handleStatUpdate('topAssists', index, 'assists', e.target.value)} className="w-12 sm:w-16 bg-black/50 border border-white/10 rounded-md sm:rounded-lg p-1.5 sm:p-2 text-center text-emerald-400 font-bold focus:outline-none text-sm shrink-0" title="الصناعات" />
                                  <input type="text" value={player.name} onChange={(e) => handleStatUpdate('topAssists', index, 'name', e.target.value)} className="flex-1 w-[40%] bg-black/50 border border-white/10 rounded-md sm:rounded-lg p-1.5 sm:p-2 focus:outline-none text-xs sm:text-sm text-white min-w-0" placeholder="اسم اللاعب" />
                                  <select value={player.team} onChange={(e) => handleStatUpdate('topAssists', index, 'team', e.target.value)} className="flex-1 w-[40%] bg-black/50 border border-white/10 rounded-md sm:rounded-lg p-1.5 sm:p-2 text-gray-300 focus:outline-none text-xs sm:text-sm cursor-pointer min-w-0">
                                    <option value="" disabled>اختر الفريق</option>
                                    {data.standings.map((t, i) => <option key={i} value={t.team} className="bg-slate-800">{t.team}</option>)}
                                  </select>
                                </div>
                              ))}
                              <button onClick={() => addStatPlayer('topAssists')} className="w-full mt-2 py-2 sm:py-3 bg-white/5 border border-white/10 border-dashed rounded-lg sm:rounded-xl flex items-center justify-center gap-2 text-xs sm:text-sm text-gray-400 hover:text-blue-400 hover:bg-blue-500/10 transition-all">
                                <i className="fa-solid fa-plus"></i> إضافة صانع لعب
                              </button>
                            </div>
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
